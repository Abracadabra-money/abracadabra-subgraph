enum PositionSide {
  " Position opened as a lender "
  LENDER

  " Position opened as a borrower "
  BORROWER
}

type Protocol @entity {
  id: ID!

  " Current TVL (Total Value Locked) of the entire protocol "
  totalValueLockedUsd: BigDecimal!

  " Amount of fees earned for the entire protocol "
  totalFeesGenerated: BigDecimal!

  " Total number of cauldrons "
  totalCauldronCount: Int!

  " All cauldrons that belong to this protocol "
  cauldrons: [Cauldron!]! @derivedFrom(field: "protocol")

  cauldronIds: [String!]!

  magicApe: MagicApe @derivedFrom(field: "protocol")

  magicGlp: MagicGlp @derivedFrom(field: "protocol")

  " Number of cumulative unique users "
  cumulativeUniqueUsers: Int!

  " Daily usage metrics for this protocol "
  usageMetrics: [UsageProtocolMetricsDailySnapshot!]! @derivedFrom(field: "protocol")

  " Daily financial metrics for this protocol "
  financialMetrics: [FinanceialProtocolMetricsDailySnapshot!]! @derivedFrom(field: "protocol")
}

type UsageProtocolMetricsDailySnapshot @entity {
  " ID is # of days since Unix epoch time "
  id: ID!

  " Protocol this snapshot is associated with "
  protocol: Protocol!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!

  " Number of cumulative unique users "
  cumulativeUniqueUsers: Int!
}

type FinanceialProtocolMetricsDailySnapshot @entity {
  " ID is # of days since Unix epoch time "
  id: ID!

  " Protocol this snapshot is associated with "
  protocol: Protocol!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!

  " Current TVL (Total Value Locked) of the entire protocol "
  totalValueLockedUsd: BigDecimal!

  " Amount of fees earned for the entire protocol "
  feesGenerated: BigDecimal!
}

type Cauldron @entity {
  " Smart contract address of the cauldron "
  id: ID!

  " The protocol this cauldron belongs to "
  protocol: Protocol!

  " Name of cauldron "
  name: String

  " Token that need to be deposited to take a position in cauldron "
  collateral: Collateral!

  " Creation timestamp "
  createdTimestamp: BigInt!

  " Creation block number "
  createdBlockNumber: BigInt!

  " Amount of input token per full share of output token. Only applies when the output token exists (note this is a ratio and not a percentage value, i.e. 1.05 instead of 105%) "
  exchangeRate: BigInt!

  " Price per share of input token in USD "
  collateralPriceUsd: BigDecimal!

  " Is this cauldron active "
  isActive: Boolean!

  deprecated: Boolean!

  " Last activity in this cauldron "
  lastActive: BigInt!

  oracle: Bytes
  
  oracleData: String

  " Amount of fees earned for the entire protocol "
  totalFeesGenerated: BigDecimal!

  "current accrueInfo.feesEarned "
  feesEarned: BigInt!

  " Number of cumulative unique users "
  cumulativeUniqueUsers: Int!

  " Daily usage metrics for this protocol "
  usageMetrics: [UsageCauldronMetricsDailySnapshot!]! @derivedFrom(field: "cauldron")

  " Daily financial metrics for this protocol "
  financialMetrics: [FinanceialCauldronMetricsDailySnapshot!]! @derivedFrom(field: "cauldron")
}

type UsageCauldronMetricsDailySnapshot @entity {
  " ID is # of days since Unix epoch time "
  id: ID!

  " Protocol this snapshot is associated with "
  cauldron: Cauldron!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!

  " Number of cumulative unique users "
  cumulativeUniqueUsers: Int!
}

type FinanceialCauldronMetricsDailySnapshot @entity {
  " ID is # of days since Unix epoch time "
  id: ID!

  " Protocol this snapshot is associated with "
  cauldron: Cauldron!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!

  " Current TVL (Total Value Locked) of the entire protocol "
  totalValueLockedUsd: BigDecimal!

  " Amount of fees earned for the entire protocol "
  feesGenerated: BigDecimal!
}

type Collateral @entity {
  " Smart contract address of the token "
  id: ID!

  " Name of the token, mirrored from the smart contract "
  name: String!

  " Symbol of the token, mirrored from the smart contract "
  symbol: String!

  " The number of decimal places this token uses, default to 18 "
  decimals: Int!

  " Optional field to track the price of a token, mostly for caching purposes "
  lastPriceUsd: BigDecimal

  " Optional field to track the block number of the last token price "
  lastPriceBlockNumber: BigInt

  " Optional field to track the timestamp of the last token price "
  lastPriceTimestamp: BigInt
}

type MagicApe @entity {
  " Smart contract address of the token "
  id: ID!

  " The protocol this cauldron belongs to "
  protocol: Protocol!

  " Total MagicApe rewards "
  totalRewards: BigDecimal!

  "Daily yield"
  yieldDailySnapshot: [MagicApeYieldDailySnapshot!]! @derivedFrom(field: "magicApe")

  " Daily Tvl "
  tvlDailySnapshot: [MagicApeTvlDailySnapshot!]! @derivedFrom(field: "magicApe")

  " Daily price changes "
  priceDailySnapshot: [MagicApePriceDailySnapshot!]! @derivedFrom(field: "magicApe")
}

type MagicApeYieldDailySnapshot @entity{
  " ID is # of days since Unix epoch time "
  id: ID!

  " MagicApe ref "
  magicApe: MagicApe!

  " Ape staking apr "
  apr: BigDecimal!

  " MagicApe staking apy"
  apy: BigDecimal!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!
}

type MagicApeTvlDailySnapshot @entity {
  " ID is # of days since Unix epoch time "
  id: ID!

  " MagicApe ref "
  magicApe: MagicApe!

  " Current TVL (Total Value Locked) of the entire protocol "
  totalValueLockedUsd: BigDecimal!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!
}

type MagicApePriceDailySnapshot @entity {
  " ID is # of days since Unix epoch time "
  id: ID!

  " MagicApe ref "
  magicApe: MagicApe!

  price: BigDecimal!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!
}

type MagicGlp @entity {
  " Smart contract address of the token "
  id: ID!

  " The protocol this cauldron belongs to "
  protocol: Protocol!

  " Total MagicApe rewards "
  totalRewards: BigDecimal!
}

type Account @entity {
  " { Account address } "
  id: ID!

  " All positions that belong to this account "
  positions: [Position!]! @derivedFrom(field: "account")

  " All deposit events of this account "
  deposits: [Deposit!]! @derivedFrom(field: "account")
}

type Deposit @entity(immutable: true) {
  " { Transaction hash }-{ Log index } "
  id: ID!

  " Transaction hash of the transaction that emitted this event "
  hash: String!

  " Nonce of the transaction that emitted this event "
  nonce: BigInt!

  " Event log index. For transactions that don't emit event, create arbitrary index starting from 0 "
  logIndex: Int!

  " Block number of this event "
  blockNumber: BigInt!

  " Timestamp of this event "
  timestamp: BigInt!

  " Account that deposited tokens "
  account: Account!

  " The market tokens are deposited to "
  cauldron: Cauldron!

  " The user position changed by this event "
  position: Position!

  " Token deposited "
  collateral: Collateral!

  " Amount of token deposited in native units "
  amount: BigInt!

  " Amount of token deposited in USD "
  amountUsd: BigDecimal!
}

type Position @entity {
  " { Account address }-{ Market address }-{ Position Side }-{ Counter } "
  id: ID!

  " Account that owns this position "
  account: Account!

  " Side of the position (either lender or borrower) "
  side: PositionSide!

  " The market in which this position was opened "
  cauldron: Cauldron!

  " The hash of the transaction that opened this position "
  hashOpened: String!

  " The hash of the transaction that closed this position "
  hashClosed: String

  " Block number of when the position was opened "
  blockNumberOpened: BigInt!

  " Timestamp when the position was opened "
  timestampOpened: BigInt!

  " Block number of when the position was closed (0 if still open) "
  blockNumberClosed: BigInt

  " Timestamp when the position was closed (0 if still open) "
  timestampClosed: BigInt

  " Token balance in this position, in native amounts "
  balance: BigInt!

  " Number of deposits related to this position "
  depositCount: Int!

  " All deposit events of this position "
  deposits: [Deposit!]! @derivedFrom(field: "position")

  " Number of borrows related to this position "
  borrowCount: Int!

  " Number of withdrawals related to this position "
  withdrawCount: Int!

  " Number of repays related to this position "
  repayCount: Int!

  " Number of liquidations related to this position "
  liquidationCount: Int!

  " Position daily snapshots for open positions "
  snapshots: [PositionSnapshot!]! @derivedFrom(field: "position")
}

type PositionSnapshot @entity {
  " { Position ID }-{ Transaction hash }-{ Log index } "
  id: ID!

  " Transaction hash of the transaction that triggered this snapshot "
  hash: String!

  " Event log index. For transactions that don't emit event, create arbitrary index starting from 0 "
  logIndex: Int!

  " Nonce of the transaction that triggered this snapshot "
  nonce: BigInt!

  " Position of this snapshot "
  position: Position!

  " Token balance in this position, in native amounts "
  balance: BigInt!

  " Block number of this snapshot "
  blockNumber: BigInt!

  " Timestamp of this snapshot "
  timestamp: BigInt!
}

type PositionCounter @entity {
  " { Account address }-{ Market address }-{ Position Side } "
  id: ID!

  " Next count "
  nextCount: Int!
}